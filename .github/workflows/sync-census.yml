name: Sync Census Data
#trigger rern
on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

jobs:
  sync-census:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests supabase

      - name: Run census sync script
        env:
          CANCENSUS_API_KEY: ${{ secrets.CANCENSUS_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          SUPABASE_SCHEMA: ${{ secrets.SUPABASE_SCHEMA }}
        run: |
          python scripts/census_sync/sync_census.py